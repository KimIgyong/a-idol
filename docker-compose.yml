services:
  postgres:
    image: postgres:16-alpine
    container_name: a-idol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aidol
      POSTGRES_PASSWORD: aidol_dev
      POSTGRES_DB: aidol
    ports:
      - "5433:5432"
    volumes:
      - a_idol_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidol -d aidol"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: a-idol-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - a_idol_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4
    container_name: a-idol-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  a_idol_pg_data:
  a_idol_redis_data:
