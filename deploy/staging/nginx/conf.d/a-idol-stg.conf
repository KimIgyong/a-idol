# a-idol-stg.amoeba.site 용 server block
# 1) :80 — certbot challenge + HTTPS 리다이렉트
# 2) :443 — TLS 종료, /api → backend, 그 외 → CMS SPA

# ----------------------------------------------------------------------
# HTTP — Let's Encrypt webroot challenge + HTTPS 강제 리다이렉트
# ----------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name a-idol-stg.amoeba.site;

    # Healthz (Docker healthcheck 용 — TLS 발급 전에도 통과해야 함)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외는 모두 HTTPS 로
    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------------------
# HTTPS — CMS SPA + /api 백엔드 프록시
# ----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name a-idol-stg.amoeba.site;

    # 인증서 — certbot 발급 후 활성화 (초기 부팅 시 nginx-init 단계 참고)
    ssl_certificate     /etc/letsencrypt/live/a-idol-stg.amoeba.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/a-idol-stg.amoeba.site/privkey.pem;
    include /etc/nginx/snippets/ssl-strong.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # 헬스체크 (TLS 종료 후)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # 업로드 자산 — backend 컨테이너에서 ServeStaticModule 이 제공하지만
    # nginx 캐시를 한 번 더 거치면 부하 분산.
    location /api/uploads/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API + WS gateway (chat) — 모두 backend 컨테이너로
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # 채팅 long-poll / SSE 대비
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        # 큰 응답 streaming 시 buffering off (선택)
        proxy_buffering off;
    }

    # Swagger / docs (staging 에서만 노출, prod 에서는 차단 권장)
    location /docs {
        proxy_pass http://backend:3000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # /metrics — 운영 ACL. ALB / ingress 대신 nginx 에서 차단.
    # 외부 Prometheus / Grafana Cloud 에서 스크래이프 하려면 아래 allow 주석을
    # Prometheus 서버 IP / CIDR 로 풀고 nginx -s reload.
    # 미설정 시 404 (사실상 deny). nginx access log 에는 남으므로 정찰 시도 추적 가능.
    # 참고: deploy/staging/prometheus/prometheus.yml 의 scrape_config.
    location /metrics {
        # allow 192.0.2.0/24;     # ← Prometheus 서버 또는 사무실 VPN CIDR 로 교체
        # allow 198.51.100.42;    # ← Grafana Cloud agent IP (확인 후 채움)
        deny all;
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # CMS SPA — 그 외는 모두 정적 파일. SPA fallback (history mode).
    root /var/www/cms;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자산 caching
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
