# A-idol staging — 응답 헤더. Backend (helmet) 가 같은 헤더를 이미 추가하지만
# CMS SPA (정적) 응답에도 동일 정책을 강제하기 위해 nginx 에서 다시 부여.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "no-referrer" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Origin-Agent-Cluster "?1" always;
# CMS SPA 의 CSP — 백엔드의 Swagger CSP 와 동일 패턴이지만 dev 도구 제거됨.
# Sentry 통합 시 https://*.sentry.io 추가 필요 (ingest endpoint).
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self' https://*.sentry.io; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
