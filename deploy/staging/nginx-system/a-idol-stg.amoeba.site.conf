# Host-level nginx site for `a-idol-stg.amoeba.site` (shared-host pattern).
# 설치 위치: /etc/nginx/sites-available/a-idol-stg.amoeba.site
# 활성화: ln -s ... /etc/nginx/sites-enabled/ ; nginx -t ; systemctl reload nginx
#
# 같은 박스에서 tpi.amoeba.site (Next.js) 가 이미 wildcard *.amoeba.site
# cert 를 사용 중. 동일 cert 재사용으로 별도 cert 발급 불필요.

# --- HTTP :80 ---  HTTPS 강제 + ACME 챌린지 fallback
server {
    listen 80;
    listen [::]:80;
    server_name a-idol-stg.amoeba.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS :443 ---  CMS SPA + /api 백엔드 forward
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name a-idol-stg.amoeba.site;

    client_max_body_size 20M;

    ssl_certificate     /etc/letsencrypt/live/amoeba.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amoeba.site/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=300" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;

    # Healthz — TLS 종료 후
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # /api/* (uploads + Swagger /docs 포함) → backend container
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_buffering off;
    }

    # Swagger
    location /docs {
        proxy_pass http://127.0.0.1:3001/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # /metrics — 비공개 (admin IP 만 풀어서 사용)
    location /metrics {
        deny all;
        return 404;
    }

    # CMS SPA — 그 외 정적 파일. SPA fallback (history mode).
    root /var/www/a-idol-cms;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
