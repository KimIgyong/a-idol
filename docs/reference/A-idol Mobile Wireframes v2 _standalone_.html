  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"ko\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>A-idol Mobile Wireframes — v2 Full Flow<\u002Ftitle>\n\n<style>\n/* ── Design Tokens (default: Blue) ─────────────── */\n:root, [data-theme=\"blue\"] {\n  --bg:#FFFFFF; --surface:#F3F6FC; --elevated:#E6ECF6;\n  --accent:#2563EB; --accent-lt:#EAF1FE; --accent-dk:#1E40AF; --accent-sk:#60A5FA; --accent2:#0EA5E9;\n  --text1:#0B1220; --text2:#556079; --text3:#A5AEC2;\n  --border:rgba(14,30,70,0.08); --border-md:rgba(14,30,70,0.14);\n  --success:#10B981; --danger:#EF4444; --page-bg:#E6ECF6;\n}\n[data-theme=\"white\"]{\n  --bg:#FFFFFF; --surface:#FAFAFA; --elevated:#F2F2F2;\n  --accent:#111111; --accent-lt:#F2F2F2; --accent-dk:#000000; --accent-sk:#555555; --accent2:#666666;\n  --text1:#0B0B0B; --text2:#555; --text3:#AAA;\n  --border:rgba(0,0,0,0.08); --border-md:rgba(0,0,0,0.14);\n  --success:#10B981; --danger:#EF4444; --page-bg:#EDEDED;\n}\n[data-theme=\"dark\"]{\n  --bg:#0F141F; --surface:#171E2C; --elevated:#232B3D;\n  --accent:#60A5FA; --accent-lt:#1E293B; --accent-dk:#3B82F6; --accent-sk:#93C5FD; --accent2:#22D3EE;\n  --text1:#F3F6FC; --text2:#A5AEC2; --text3:#5A6478;\n  --border:rgba(255,255,255,0.08); --border-md:rgba(255,255,255,0.14);\n  --success:#10B981; --danger:#F87171; --page-bg:#060913;\n}\n[data-theme=\"pink\"]{\n  --bg:#FFFFFF; --surface:#FFF3F7; --elevated:#FBE0EB;\n  --accent:#EC4899; --accent-lt:#FCE7F3; --accent-dk:#BE185D; --accent-sk:#F9A8D4; --accent2:#F472B6;\n  --text1:#1F0B17; --text2:#7A5568; --text3:#C5A8B5;\n  --border:rgba(120,20,70,0.08); --border-md:rgba(120,20,70,0.14);\n  --success:#10B981; --danger:#EF4444; --page-bg:#FADDEA;\n}\n[data-theme=\"purple\"]{\n  --bg:#FFFFFF; --surface:#F7F3FE; --elevated:#EBE0FA;\n  --accent:#8B5CF6; --accent-lt:#EDE9FE; --accent-dk:#6D28D9; --accent-sk:#C4B5FD; --accent2:#A78BFA;\n  --text1:#180B28; --text2:#5E5078; --text3:#B4A8C8;\n  --border:rgba(60,20,120,0.08); --border-md:rgba(60,20,120,0.14);\n  --success:#10B981; --danger:#EF4444; --page-bg:#DED0F5;\n}\n\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml,body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Segoe UI',sans-serif;}\nbody{background:var(--page-bg);min-height:100vh;padding:28px 12px 80px;color:var(--text1);transition:background .25s;}\n\n/* ── Page header / theme picker ── */\n.page-title{text-align:center;font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-.5px;margin-bottom:4px;}\n.page-sub{text-align:center;font-size:11px;color:var(--text2);margin-bottom:14px;}\n\n.theme-picker{display:flex;gap:6px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}\n.theme-chip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:16px;font-size:11px;font-weight:600;border:1.5px solid var(--border-md);cursor:pointer;background:var(--bg);color:var(--text2);}\n.theme-chip.active{border-color:var(--accent);color:var(--accent);}\n.theme-dot{width:10px;height:10px;border-radius:5px;}\n\n/* ── Nav/tabs ── */\n.tabs{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:22px;max-width:980px;margin-left:auto;margin-right:auto;}\n.tab-btn{padding:6px 12px;border-radius:18px;font-size:11px;font-weight:600;border:1.5px solid var(--border-md);cursor:pointer;background:var(--bg);color:var(--text2);transition:all .15s;}\n.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}\n.tab-btn:hover:not(.active){background:var(--surface);}\n\n.screens{min-height:600px;}\n.screen{display:none;justify-content:center;gap:28px;flex-wrap:wrap;}\n.screen.active{display:flex;}\n\n/* ── Phone shell ── */\n.phone{width:224px;background:var(--bg);border-radius:38px;border:1.5px solid var(--border-md);overflow:hidden;flex-shrink:0;box-shadow:0 0 0 6px rgba(14,30,70,.04),0 18px 40px rgba(14,30,70,.12);position:relative;}\n.phone-notch{height:24px;background:var(--bg);display:flex;align-items:center;justify-content:center;}\n.notch-pill{width:62px;height:8px;background:#0B1220;border-radius:5px;}\n[data-theme=\"dark\"] .notch-pill{background:#000;}\n.phone-label{text-align:center;font-size:10px;color:var(--text2);margin-top:10px;letter-spacing:.2px;max-width:224px;}\n.status-bar{display:flex;justify-content:space-between;align-items:center;padding:2px 16px 4px;font-size:9px;color:var(--text1);font-weight:600;}\n\n/* ── Generic UI primitives ── */\n.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--bg);border-bottom:1px solid var(--border);}\n.nav-title{font-size:13px;font-weight:700;color:var(--text1);}\n.btab{display:flex;justify-content:space-around;align-items:center;padding:8px 4px 12px;background:var(--bg);border-top:1px solid var(--border);}\n.ti{display:flex;flex-direction:column;align-items:center;gap:2px;}\n.ti-lbl{font-size:7px;color:var(--text3);}\n.ti.on .ti-lbl{color:var(--accent);font-weight:700;}\n\n.btn-primary{width:100%;padding:11px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}\n.btn-ghost{width:100%;padding:11px;border-radius:12px;background:var(--bg);color:var(--text1);border:1.5px solid var(--border-md);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}\n.input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 11px;font-size:10px;color:var(--text1);font-family:inherit;}\n.input::placeholder{color:var(--text3);}\n.field-label{font-size:9px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}\n.link{color:var(--accent);font-size:10px;text-decoration:none;font-weight:600;cursor:pointer;}\n\n/* ── Splash ── */\n.splash-bg{min-height:460px;background:linear-gradient(160deg,var(--accent-dk),var(--accent) 55%,var(--accent2
