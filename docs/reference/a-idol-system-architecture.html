<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-idol System Architecture</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d14;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }
  h1 {
    font-size: 15px;
    font-weight: 700;
    color: #B066FF;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
    text-align: center;
  }
  .subtitle {
    font-size: 11px;
    color: #8A8A9A;
    margin-bottom: 28px;
    text-align: center;
  }
  .diagram-wrap {
    width: 100%;
    max-width: 760px;
    background: #14141F;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 16px;
    overflow-x: auto;
  }
  svg { display: block; width: 100%; height: auto; }

  /* SVG class system — mirrors the Visualizer pre-built classes */
  .t  { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; font-size: 14px; font-weight: 400; fill: #c2c0b6; }
  .ts { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; font-size: 12px; font-weight: 400; fill: #8A8A9A; }
  .th { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; font-size: 14px; font-weight: 500; fill: #F0EEF8; }
  .box { fill: #1E1E2E; stroke: rgba(255,255,255,0.12); }
  .arr { fill: none; stroke: rgba(255,255,255,0.25); stroke-width: 1.5; }
  .leader { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 0.5; stroke-dasharray: 4 3; }

  /* c-purple */
  .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #2a1a4a; stroke: #7F77DD; }
  .c-purple .th { fill: #CECBF6; }
  .c-purple .ts { fill: #AFA9EC; }

  /* c-teal */
  .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #083028; stroke: #1D9E75; }
  .c-teal .th { fill: #9FE1CB; }
  .c-teal .ts { fill: #5DCAA5; }

  /* c-coral */
  .c-coral rect, .c-coral circle, .c-coral ellipse { fill: #3a1a10; stroke: #993C1D; }
  .c-coral .th { fill: #F5C4B3; }
  .c-coral .ts { fill: #F0997B; }

  /* c-amber */
  .c-amber rect, .c-amber circle, .c-amber ellipse { fill: #2a1a04; stroke: #BA7517; }
  .c-amber .th { fill: #FAC775; }
  .c-amber .ts { fill: #EF9F27; }

  /* c-blue */
  .c-blue rect, .c-blue circle, .c-blue ellipse { fill: #04244a; stroke: #185FA5; }
  .c-blue .th { fill: #B5D4F4; }
  .c-blue .ts { fill: #85B7EB; }

  /* c-green */
  .c-green rect, .c-green circle, .c-green ellipse { fill: #0a2804; stroke: #3B6D11; }
  .c-green .th { fill: #C0DD97; }
  .c-green .ts { fill: #97C459; }

  /* c-pink */
  .c-pink rect, .c-pink circle, .c-pink ellipse { fill: #2a0818; stroke: #993556; }
  .c-pink .th { fill: #F4C0D1; }
  .c-pink .ts { fill: #ED93B1; }

  /* c-gray */
  .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #1c1c22; stroke: #5F5E5A; }
  .c-gray .th { fill: #D3D1C7; }
  .c-gray .ts { fill: #B4B2A9; }

  /* node hover */
  .node { cursor: pointer; }
  .node:hover rect, .node:hover circle, .node:hover ellipse { opacity: .82; }

  /* dashed container */
  .container-dash { fill: none; stroke: rgba(255,255,255,0.1); stroke-dasharray: 5 3; stroke-width: 1; }
  .container-label { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; font-size: 11px; font-weight: 400; fill: #444455; }
</style>
</head>
<body>

<h1>★ A-idol — System Architecture</h1>
<div class="subtitle">플랫폼 시스템 아키텍처 v1.0.0</div>

<div class="diagram-wrap">
<svg viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>A-idol System Architecture</title>
  <desc>A-idol platform showing React Native mobile app, React CMS web, NestJS backend, PostgreSQL DB, and Clean Architecture layers</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="28" text-anchor="middle" font-size="15">A-idol Platform — System Architecture</text>

  <!-- ── CLIENT TIER ── -->
  <rect class="container-dash" x="30" y="46" width="620" height="132" rx="12"/>
  <text class="container-label" x="44" y="62">Client tier (클라이언트)</text>

  <!-- Mobile App -->
  <g class="node c-purple" onclick="alert('React Native App\niOS + Android\n팬 유저 전용 — 모바일 온리')">
    <rect x="50" y="70" width="180" height="94" rx="10" stroke-width="0.5"/>
    <text class="th" x="140" y="100" text-anchor="middle">React Native App</text>
    <text class="ts" x="140" y="118" text-anchor="middle">iOS + Android</text>
    <text class="ts" x="140" y="134" text-anchor="middle">팬 유저 전용</text>
    <text class="ts" x="140" y="150" text-anchor="middle">모바일 온리</text>
  </g>

  <!-- CMS Web -->
  <g class="node c-teal" onclick="alert('React CMS Web\n관리자 / 어드민\n콘텐츠·오디션 관리\n통계 / 투표 설정')">
    <rect x="450" y="70" width="180" height="94" rx="10" stroke-width="0.5"/>
    <text class="th" x="540" y="100" text-anchor="middle">React CMS Web</text>
    <text class="ts" x="540" y="118" text-anchor="middle">관리자 / 어드민</text>
    <text class="ts" x="540" y="134" text-anchor="middle">콘텐츠·오디션 관리</text>
    <text class="ts" x="540" y="150" text-anchor="middle">통계 / 투표 설정</text>
  </g>

  <!-- Arrow: Mobile → API -->
  <line x1="140" y1="164" x2="140" y2="220" class="arr" marker-end="url(#arrow)" stroke="#7F77DD"/>
  <text class="ts" x="148" y="196" font-size="10">REST / WS</text>

  <!-- Arrow: CMS → API -->
  <line x1="540" y1="164" x2="540" y2="220" class="arr" marker-end="url(#arrow)" stroke="#1D9E75"/>
  <text class="ts" x="548" y="196" font-size="10">REST</text>

  <!-- ── API LAYER ── -->
  <rect class="container-dash" x="30" y="216" width="620" height="62" rx="12"/>
  <text class="container-label" x="44" y="232">API Gateway / Interface layer</text>

  <g class="node c-coral" onclick="alert('NestJS Backend\nREST Controllers · WebSocket Gateways\nGuards · Interceptors · Pipes')">
    <rect x="160" y="226" width="360" height="42" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="243" text-anchor="middle">NestJS Backend</text>
    <text class="ts" x="340" y="258" text-anchor="middle">REST Controllers · WebSocket Gateways · Guards · Interceptors</text>
  </g>

  <!-- ── CLEAN ARCHITECTURE ── -->
  <rect class="container-dash" x="30" y="294" width="620" height="204" rx="12"/>
  <text class="container-label" x="44" y="310">Clean Architecture layers (NestJS 내부)</text>

  <!-- Application Layer -->
  <g class="node c-amber" onclick="alert('Application Layer\nUse Cases\nVoteUseCase · ChatUseCase\nPhotocardUseCase · FanClubUseCase\nAuthUseCase · IdolUseCase')">
    <rect x="50" y="318" width="280" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="190" y="340" text-anchor="middle">Application Layer</text>
    <text class="ts" x="190" y="356" text-anchor="middle">Use Cases</text>
    <text class="ts" x="190" y="372" text-anchor="middle">VoteUseCase · ChatUseCase</text>
    <text class="ts" x="190" y="388" text-anchor="middle">PhotocardUseCase · FanClubUseCase</text>
  </g>

  <!-- Domain Layer -->
  <g class="node c-blue" onclick="alert('Domain Layer\nEntities + Repository Interfaces\nIdol · User · Vote · Audition\nFanClub · Photocard · Coupon\nBusiness rules enforced here')">
    <rect x="350" y="318" width="280" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="490" y="340" text-anchor="middle">Domain Layer</text>
    <text class="ts" x="490" y="356" text-anchor="middle">Entities + Repository Interfaces</text>
    <text class="ts" x="490" y="372" text-anchor="middle">Idol · User · Vote · Audition</text>
    <text class="ts" x="490" y="388" text-anchor="middle">FanClub · Photocard · Coupon</text>
  </g>

  <!-- Infrastructure Layer -->
  <g class="node c-gray" onclick="alert('Infrastructure Layer\nPostgreSQL Repositories · Redis (cache / rate-limit)\nS3 (images) · FCM (push) · Payment Gateway\nWebSocket (Socket.io) · BullMQ (job queue)')">
    <rect x="50" y="410" width="580" height="78" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="432" text-anchor="middle">Infrastructure Layer</text>
    <text class="ts" x="340" y="450" text-anchor="middle">PostgreSQL Repositories · Redis (cache / rate-limit) · S3 (images)</text>
    <text class="ts" x="340" y="466" text-anchor="middle">FCM (push) · Payment Gateway · WebSocket (Socket.io) · BullMQ</text>
  </g>

  <!-- ── DATA TIER ── -->
  <rect class="container-dash" x="30" y="512" width="620" height="114" rx="12"/>
  <text class="container-label" x="44" y="528">Data tier (데이터 / 외부 서비스)</text>

  <!-- PostgreSQL -->
  <g class="node c-blue" onclick="alert('PostgreSQL 15+\n20개 테이블\n인덱스 + 트리거\n모든 도메인 엔티티 저장')">
    <rect x="50" y="536" width="150" height="78" rx="8" stroke-width="0.5"/>
    <text class="th" x="125" y="562" text-anchor="middle">PostgreSQL</text>
    <text class="ts" x="125" y="578" text-anchor="middle">Primary DB</text>
    <text class="ts" x="125" y="594" text-anchor="middle">20 tables</text>
  </g>

  <!-- Redis -->
  <g class="node c-amber" onclick="alert('Redis\nSession · Cache\nChat quota counter\nVote ranking sorted set (ZSET)\nRate limiting')">
    <rect x="218" y="536" width="130" height="78" rx="8" stroke-width="0.5"/>
    <text class="th" x="283" y="562" text-anchor="middle">Redis</text>
    <text class="ts" x="283" y="578" text-anchor="middle">Session · Cache</text>
    <text class="ts" x="283" y="594" text-anchor="middle">Chat quota · Vote rank</text>
  </g>

  <!-- S3 -->
  <g class="node c-green" onclick="alert('S3-compatible Storage\nPhotocard images\nIdol profile photos\nUser profile images')">
    <rect x="366" y="536" width="120" height="78" rx="8" stroke-width="0.5"/>
    <text class="th" x="426" y="562" text-anchor="middle">S3 Storage</text>
    <text class="ts" x="426" y="578" text-anchor="middle">Photocard imgs</text>
    <text class="ts" x="426" y="594" text-anchor="middle">Idol profiles</text>
  </g>

  <!-- FCM -->
  <g class="node c-pink" onclick="alert('FCM\nFirebase Cloud Messaging\niOS + Android push\n아이돌 소식 알림\n오디션 투표 알림\n자동 메시지 push')">
    <rect x="504" y="536" width="106" height="78" rx="8" stroke-width="0.5"/>
    <text class="th" x="557" y="562" text-anchor="middle">FCM</text>
    <text class="ts" x="557" y="578" text-anchor="middle">Push Notifications</text>
    <text class="ts" x="557" y="594" text-anchor="middle">iOS + Android</text>
  </g>

  <!-- ── KEY FEATURES ── -->
  <rect x="30" y="644" width="620" height="66" rx="10" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <text class="ts" x="340" y="664" text-anchor="middle" font-size="11" fill="#555566">핵심 도메인 기능</text>
  <text class="ts" x="88"  y="684" text-anchor="middle">99 아이돌 프로필</text>
  <text class="ts" x="202" y="684" text-anchor="middle">투표 / 오디션</text>
  <text class="ts" x="320" y="684" text-anchor="middle">포토카드 (가챠)</text>
  <text class="ts" x="440" y="684" text-anchor="middle">팬클럽 채팅</text>
  <text class="ts" x="562" y="684" text-anchor="middle">좋아요 / 팔로우</text>
  <line x1="148" y1="672" x2="148" y2="700" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <line x1="264" y1="672" x2="264" y2="700" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <line x1="380" y1="672" x2="380" y2="700" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <line x1="496" y1="672" x2="496" y2="700" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
</svg>
</div>

<p style="margin-top:16px;font-size:10px;color:#444455;text-align:center;">
  각 컴포넌트를 클릭하면 상세 설명을 확인할 수 있습니다.
</p>

</body>
</html>
