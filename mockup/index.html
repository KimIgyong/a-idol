<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-idol · 모바일 목업 (Light)</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
/* ── Design Tokens (from a-idol-mobile-wireframes.html) ─────────── */
:root {
  --bg:        #FFFFFF;
  --surface:   #F7F6F3;
  --elevated:  #EDECEA;
  --accent:    #FF7A20;
  --accent-lt: #FFF1E8;
  --accent-dk: #D85A08;
  --accent2:   #E03060;
  --gold:      #C8880A;
  --text1:     #18181E;
  --text2:     #666674;
  --text3:     #AAABB8;
  --border:    rgba(0,0,0,0.08);
  --border-md: rgba(0,0,0,0.13);
  --success:   #14996A;
  --luna:      #5E2DA0;
  --kira:      #1851A8;
  --nova:      #1A7A50;
  --aria:      #A82020;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:#EDECEA;
  font-family:'Apple SD Gothic Neo','Noto Sans KR','Segoe UI',sans-serif;
  color:var(--text1);
  min-height:100vh;
  padding:32px 16px 60px;
  -webkit-font-smoothing:antialiased;
}

/* Page header */
.page-title{text-align:center;font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-.5px;margin-bottom:4px;}
.page-sub{text-align:center;font-size:11px;color:var(--text2);margin-bottom:10px;}
.api-pill{display:inline-flex;align-items:center;gap:5px;margin:0 auto 22px;padding:3px 10px;background:var(--bg);border:1px solid var(--border);border-radius:999px;font-size:10px;color:var(--text2);}
.api-pill .dot{width:6px;height:6px;border-radius:3px;background:var(--text3);}
.api-pill.ok .dot{background:var(--success);}
.api-pill.down .dot{background:var(--accent2);}
.page-wrap{max-width:840px;margin:0 auto;}
.frame-wrap{display:flex;flex-wrap:wrap;gap:28px;justify-content:center;}
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
.phone-label{text-align:center;font-size:10px;color:var(--text2);letter-spacing:.2px;}

/* ── Screen tabs (view switcher) ── */
.tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:26px;}
.tab-btn{
  padding:7px 18px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid var(--border-md);cursor:pointer;
  background:var(--bg);color:var(--text2);transition:all .15s;
  font-family:inherit;
}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.tab-btn:hover:not(.active){background:var(--surface);}

/* ── Phone shell — iPhone 15 (393×852 pt; ratio 393/852 = 0.461) ── */
/* Base coords = 224 wide to keep the reference density; `zoom: 1.75` lifts
   the whole frame to iPhone 15 point scale (~392×852 CSS px) crisply. */
.phone{
  width:224px;height:486px;              /* 224 × (852/393) ≈ 486 → iPhone 15 ratio */
  zoom:1.75;                              /* renders at ~392×852 (real iPhone 15) */
  background:var(--bg);
  border-radius:31px;                     /* × 1.75 ≈ 54px ≈ iPhone 15 corner */
  border:1.5px solid rgba(0,0,0,.16);
  overflow:hidden;flex-shrink:0;
  box-shadow:0 0 0 6px rgba(0,0,0,.04), 0 24px 52px rgba(0,0,0,.13);
  display:flex;flex-direction:column;
}
.phone-notch{
  height:34px;                            /* × 1.75 ≈ 60px = iPhone 15 top safe area */
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding-top:6px;                        /* × 1.75 ≈ 11px = island top margin */
}
/* Dynamic Island — iPhone 15 (126 × 37 pt, r 18.5 → scaled to 224-base) */
.dynamic-island{
  width:72px;height:21px;
  background:#18181e;border-radius:11px;
}
/* Legacy alias kept so any stray .notch-pill still renders. */
.notch-pill{width:72px;height:21px;background:#18181e;border-radius:11px;}

.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:2px 16px 4px;font-size:9px;color:var(--text1);font-weight:600;
}
.status-icons{display:flex;gap:5px;align-items:center;}
.status-icons svg{width:11px;height:11px;color:var(--text1);}

.phone-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}

/* Nav bar */
.nav-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;background:var(--bg);border-bottom:1px solid var(--border);
}
.nav-title{font-size:13px;font-weight:700;color:var(--text1);}
.nav-icon{width:18px;height:18px;color:var(--text2);cursor:pointer;}
.nav-icon.accent{color:var(--accent);}
.nav-stub{width:18px;}

/* Bottom Tab Bar */
.btab{
  display:flex;justify-content:space-around;align-items:center;
  padding:9px 4px 14px;background:var(--bg);
  border-top:1px solid var(--border);
}
.ti{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:transparent;border:none;font-family:inherit;}
.ti svg{width:20px;height:20px;color:var(--text3);}
.ti-lbl{font-size:7px;color:var(--text3);font-weight:500;}
.ti.on svg{color:var(--accent);}
.ti.on .ti-lbl{color:var(--accent);font-weight:700;}

/* ── Feed ── */
.feed-scroll{flex:1;overflow-y:auto;}
.feed-header{padding:10px 14px 5px;display:flex;justify-content:space-between;align-items:center;}
.logo-text{font-size:17px;font-weight:900;color:var(--accent);letter-spacing:-.6px;}
.chips{display:flex;gap:5px;padding:4px 12px 9px;overflow-x:auto;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:3px 10px;border-radius:12px;font-size:9px;font-weight:500;background:var(--elevated);color:var(--text2);white-space:nowrap;border:1px solid transparent;cursor:pointer;font-family:inherit;}
.chip.active{background:var(--accent-lt);color:var(--accent);border-color:rgba(255,122,32,.22);}
.idol-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 10px 10px;}

.idol-card{background:var(--bg);border-radius:16px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer;padding:0;text-align:left;font-family:inherit;}
.char-card{height:114px;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;}
.char-bg{position:absolute;inset:0;}
.char-fade{position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent, rgba(0,0,0,.32));}
.char-img{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:88px;height:96px;object-fit:contain;object-position:bottom center;}
.like-badge{
  position:relative;z-index:3;background:rgba(255,255,255,.92);
  border-radius:10px;padding:2px 6px;font-size:8px;color:var(--text1);
  display:flex;align-items:center;gap:2px;margin:0 6px 6px 0;align-self:flex-end;margin-left:auto;
  box-shadow:0 1px 4px rgba(0,0,0,.10);
}
.card-info{padding:7px 9px 9px;}
.card-name{font-size:10.5px;font-weight:800;color:var(--text1);}
.card-agency{font-size:8px;color:var(--text2);margin-top:1px;}
.card-actions{display:flex;align-items:center;gap:7px;margin-top:6px;}
.card-actions .follow{font-size:8px;color:var(--text2);display:flex;align-items:center;gap:2px;}
.card-actions .follow.on{color:var(--accent);font-weight:600;}

/* ── Detail ── */
.char-hero{height:172px;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;}
.char-hero-bg{position:absolute;inset:0;}
.char-hero-fade{position:absolute;bottom:0;left:0;right:0;height:70px;background:linear-gradient(transparent, var(--bg));}
.char-hero-img{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:140px;height:160px;object-fit:contain;object-position:bottom center;}
.hero-back-btn{
  position:absolute;top:10px;left:12px;background:rgba(255,255,255,.90);border-radius:14px;
  padding:3px 9px;display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text1);z-index:5;cursor:pointer;border:none;font-family:inherit;
}
.hero-actions{position:absolute;top:10px;right:12px;display:flex;gap:6px;z-index:5;}
.hero-action-btn{background:rgba(255,255,255,.90);border-radius:14px;padding:5px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;}
.photo-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:3px;z-index:5;}
.photo-dot{width:4px;height:4px;border-radius:2px;background:rgba(255,255,255,.45);}
.photo-dot.active{background:#fff;width:10px;}

.detail-card{background:var(--bg);padding:10px 13px;}
.idol-name{font-size:15px;font-weight:800;color:var(--text1);}
.agency-badge{display:inline-block;background:var(--accent-lt);border:1px solid rgba(255,122,32,.28);border-radius:8px;padding:1px 7px;font-size:8px;color:var(--accent);margin-left:6px;font-weight:700;}
.detail-tags{display:flex;gap:3px;margin:5px 0;flex-wrap:wrap;}
.detail-tag{background:var(--elevated);border-radius:8px;padding:2px 7px;font-size:8px;color:var(--text2);}
.stat-row{display:flex;gap:16px;padding:6px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:6px 0;}
.stat-item{font-size:8px;color:var(--text2);display:flex;align-items:center;gap:3px;}
.stat-item strong{color:var(--text1);font-size:9.5px;font-weight:700;}
.action-row{display:flex;gap:5px;margin-bottom:9px;}
.action-btn{flex:1;padding:8px;border-radius:10px;font-size:8px;font-weight:700;text-align:center;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;font-family:inherit;}
.action-like{background:rgba(224,48,96,.09);color:var(--accent2);}
.action-follow{background:var(--elevated);color:var(--text2);}
.action-chat{background:var(--accent);color:#fff;}
.section-label{font-size:9px;font-weight:700;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:.5px;}
.schedule-row{display:flex;gap:5px;align-items:center;padding:4px 0;}
.sched-date{font-size:7.5px;color:var(--accent);font-weight:700;min-width:28px;}
.sched-type{background:var(--accent-lt);border-radius:4px;padding:1px 6px;font-size:7.5px;color:var(--accent);font-weight:600;}
.sched-title{font-size:8px;color:var(--text1);}

/* ── Audition ── */
.audi-scroll{flex:1;overflow-y:auto;}
.audi-hero{background:linear-gradient(135deg,#FF7A20,#FF4060);padding:14px 13px 12px;}
.audi-hero-title{font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:5px;}
.audi-hero-sub{font-size:8px;color:rgba(255,255,255,.82);margin-top:3px;}
.countdown{font-size:17px;font-weight:800;color:#fff;margin:5px 0;font-variant-numeric:tabular-nums;letter-spacing:1px;}
.audi-cta{background:#fff;border-radius:8px;padding:5px 13px;font-size:9px;color:var(--accent);font-weight:700;display:inline-flex;align-items:center;gap:4px;margin-top:4px;}
.round-track{display:flex;align-items:center;gap:2px;padding:8px 13px;}
.round-circle{width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;flex-shrink:0;}
.round-line{flex:1;height:1px;background:var(--border);}
.rc-done{background:var(--accent);color:#fff;}
.rc-cur{border:2px solid var(--accent);color:var(--accent);background:transparent;box-shadow:0 0 6px rgba(255,122,32,.3);}
.rc-fut{background:var(--elevated);color:var(--text3);}
.rank-list{padding:4px 13px;}
.rank-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);}
.rank-no{font-size:10px;font-weight:800;color:var(--gold);min-width:14px;}
.rank-avatar{width:28px;height:28px;border-radius:14px;flex-shrink:0;overflow:hidden;border:1.5px solid var(--border);background:var(--surface);}
.rank-avatar img{width:100%;height:100%;object-fit:cover;object-position:top center;}
.rank-name{font-size:9px;font-weight:600;color:var(--text1);flex:1;}
.rank-bar{flex:2;height:4px;border-radius:2px;background:var(--elevated);overflow:hidden;}
.rank-bar-fill{height:100%;border-radius:2px;}
.rank-count{font-size:7.5px;color:var(--text2);min-width:34px;text-align:right;}
.rank-delta{font-size:7.5px;min-width:12px;font-weight:600;}
.dup{color:var(--success);}
.ddn{color:var(--accent2);}

/* ── Gacha ── */
.gacha-body{padding:9px 14px;flex:1;overflow-y:auto;}
.card-fan{display:flex;justify-content:center;position:relative;height:120px;margin:6px 0 14px;}
.fan-card{width:66px;height:100px;border-radius:10px;position:absolute;border:1.5px solid rgba(0,0,0,.09);top:10px;left:50%;transform-origin:bottom center;box-shadow:0 4px 14px rgba(0,0,0,.10);overflow:hidden;background:var(--surface);}
.fan-card img{width:100%;height:100%;object-fit:cover;object-position:top center;}
.fc1{transform:translateX(-63px) rotate(-25deg);}
.fc2{transform:translateX(-31px) rotate(-12deg);z-index:2;}
.fc3{transform:translateX(0) rotate(0);z-index:3;}
.fc4{transform:translateX(31px) rotate(12deg);z-index:2;}
.fc5{transform:translateX(63px) rotate(25deg);}
.gacha-set-name{font-size:12px;font-weight:800;color:var(--text1);text-align:center;}
.gacha-set-sub{font-size:8px;color:var(--text2);text-align:center;margin-top:2px;}
.coll-dots{display:flex;gap:3px;flex-wrap:wrap;margin:8px 0 4px;}
.coll-dot{width:10px;height:10px;border-radius:3px;}
.coll-dot.owned{background:var(--accent);}
.coll-dot.empty{background:var(--elevated);border:1px solid var(--border);}
.price-row{display:flex;align-items:center;justify-content:space-between;margin-top:9px;}
.price-label{font-size:10px;color:var(--text2);}
.price-value{font-size:15px;font-weight:800;color:var(--accent);}
.gacha-btn{width:100%;padding:10px;border-radius:12px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;border:none;cursor:pointer;margin-top:10px;letter-spacing:.3px;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;}
.gacha-btn:hover{opacity:.9;}
.gacha-note{font-size:7.5px;color:var(--text3);text-align:center;margin-top:5px;}

/* ── Auth (Login / Signup) ── */
.auth-body{flex:1;display:flex;flex-direction:column;padding:18px 18px 10px;overflow-y:auto;}
.auth-logo{font-size:26px;font-weight:900;color:var(--accent);letter-spacing:-1px;text-align:center;margin-top:12px;}
.auth-sub{font-size:10px;color:var(--text2);text-align:center;margin-top:2px;margin-bottom:18px;}
.auth-form{display:flex;flex-direction:column;gap:10px;}
.field-label{font-size:9px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;display:block;}
.field-input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:9px 11px;font-size:10.5px;color:var(--text1);
  font-family:inherit;outline:none;
}
.field-input:focus{border-color:var(--accent);background:#fff;}
.primary-btn{
  width:100%;padding:11px;border-radius:12px;background:var(--accent);
  color:#fff;font-size:11px;font-weight:800;border:none;cursor:pointer;
  font-family:inherit;margin-top:4px;
}
.primary-btn:disabled{opacity:.6;cursor:wait;}
.error-msg{font-size:9px;color:var(--accent2);padding:4px 0;display:flex;align-items:center;gap:3px;}
.link-row{text-align:center;font-size:9px;color:var(--text2);margin-top:10px;background:none;border:none;cursor:pointer;font-family:inherit;padding:6px;}
.link-row b{color:var(--accent);font-weight:700;}
.fineprint{font-size:8px;color:var(--text3);text-align:center;margin-top:6px;line-height:1.5;}

/* ── MY (profile) ── */
.my-scroll{flex:1;overflow-y:auto;padding:10px 14px;}
.my-hero{
  background:linear-gradient(135deg,var(--accent-lt),#fff);
  border:1px solid var(--border);border-radius:14px;padding:12px;
  display:flex;align-items:center;gap:10px;
}
.my-avatar{
  width:44px;height:44px;border-radius:22px;flex-shrink:0;
  border:1.5px solid var(--border);overflow:hidden;background:var(--surface);
}
.my-avatar img{width:100%;height:100%;object-fit:cover;object-position:top center;}
.my-name{font-size:12px;font-weight:800;color:var(--text1);}
.my-email{font-size:8px;color:var(--text2);margin-top:1px;}
.my-badge{
  margin-top:4px;display:inline-flex;align-items:center;gap:3px;
  background:var(--accent);color:#fff;font-size:7px;font-weight:700;
  padding:2px 6px;border-radius:8px;
}

.my-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;}
.my-stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center;}
.my-stat-label{font-size:7.5px;color:var(--text2);}
.my-stat-value{font-size:12px;font-weight:800;color:var(--text1);margin-top:1px;}
.my-stat-value.accent{color:var(--accent);}
.my-stat-value.gold{color:var(--gold);}

.my-list{margin-top:10px;background:var(--bg);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.my-row{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  border-bottom:1px solid var(--border);cursor:pointer;
  background:transparent;border-left:0;border-right:0;border-top:0;width:100%;text-align:left;font-family:inherit;
}
.my-row:last-child{border-bottom:none;}
.my-row svg{width:14px;height:14px;color:var(--text2);}
.my-row-label{font-size:10px;color:var(--text1);flex:1;}
.my-row-hint{font-size:8px;color:var(--text3);}
.my-row.danger .my-row-label{color:var(--accent2);}
.my-row.danger svg{color:var(--accent2);}

/* Skeleton / empty */
.center-pad{padding:30px 20px;text-align:center;color:var(--text3);font-size:9px;}

/* scrollbar */
.thin-scroll::-webkit-scrollbar{width:0;height:0;}
</style>
</head>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

<script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useCallback, useMemo } = React;

  // ── API client (same as before) ────────────────────────────────
  const API_BASE = "http://localhost:3000/api/v1";
  const AT_KEY = "a-idol.at";
  const RT_KEY = "a-idol.rt";

  async function api(path, { method = "GET", body, token } = {}) {
    const headers = { "Content-Type": "application/json" };
    if (token) headers["Authorization"] = `Bearer ${token}`;
    const res = await fetch(`${API_BASE}${path}`, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined,
    });
    const text = await res.text();
    const data = text ? JSON.parse(text) : null;
    if (!res.ok) {
      const msg = data?.message || data?.error || res.statusText;
      throw new Error(Array.isArray(msg) ? msg.join(", ") : msg);
    }
    return data;
  }

  function useAuth() {
    const [accessToken, setAccessToken] = useState(() => localStorage.getItem(AT_KEY));
    const [refreshToken, setRefreshToken] = useState(() => localStorage.getItem(RT_KEY));
    const [user, setUser] = useState(null);

    const persist = useCallback((at, rt) => {
      setAccessToken(at); setRefreshToken(rt);
      if (at) localStorage.setItem(AT_KEY, at); else localStorage.removeItem(AT_KEY);
      if (rt) localStorage.setItem(RT_KEY, rt); else localStorage.removeItem(RT_KEY);
    }, []);

    const login = useCallback(async (email, password) => {
      const r = await api("/auth/login", { method: "POST", body: { email, password, deviceId: "mockup-web" } });
      persist(r.accessToken, r.refreshToken); setUser(r.user); return r.user;
    }, [persist]);

    const signup = useCallback(async (payload) => {
      const r = await api("/auth/signup", { method: "POST", body: { ...payload, deviceId: "mockup-web" } });
      persist(r.accessToken, r.refreshToken); setUser(r.user); return r.user;
    }, [persist]);

    const logout = useCallback(() => { persist(null, null); setUser(null); }, [persist]);

    const fetchMe = useCallback(async () => {
      if (!accessToken) return null;
      try {
        const u = await api("/me", { token: accessToken });
        setUser(u);
        return u;
      } catch {
        persist(null, null);
      }
    }, [accessToken, persist]);

    useEffect(() => { if (accessToken && !user) fetchMe(); }, [accessToken]);

    return { accessToken, refreshToken, user, login, signup, logout, fetchMe };
  }

  // ── Character / idol display helpers ─────────────────────────
  // Reference DiceBear adventurer seeds + palette from wireframes.
  const CHAR_PRESETS = {
    // Male — "Raw Brilliance" concept, dark espresso mullet, fair skin, phoenix eyes. Maps to docs/reference/hyun-profile.json.
    HYUN:      { bg: 'linear-gradient(160deg,#d8d4e8,#7a7594)', heroBg: 'linear-gradient(170deg,#e6e1f0,#8e88a8,#d0cadd)', seed: 'HYUN', hair: 'short18', hairColor: '3b2219', eyes: 'variant12', skinColor: 'f5d4ae', clothing: 'hoodie', clothingColor: '1f1f23' },
    LunaVeil:  { bg: 'linear-gradient(160deg,#e8d8ff,#c4a0f0)', heroBg: 'linear-gradient(170deg,#e4ccff,#c090f0,#f0d0ff)', seed: 'LunaVeil', hair: 'long16', hairColor: '6c4675', eyes: 'variant06', skinColor: 'f2d3b1', clothing: 'blazer', clothingColor: '7c3aed' },
    KiraSol:   { bg: 'linear-gradient(160deg,#d0e8ff,#90c0f8)', heroBg: 'linear-gradient(170deg,#d4e6ff,#88b4f8,#e0eaff)', seed: 'KiraSol', hair: 'short19', hairColor: '0e1e3c', eyes: 'variant14', skinColor: 'eac393', clothing: 'shirt', clothingColor: '1d4ed8' },
    NovaZen:   { bg: 'linear-gradient(160deg,#c8f0d8,#80d4a8)', heroBg: 'linear-gradient(170deg,#d8f4e0,#80d4a8,#e8faee)', seed: 'NovaZen', hair: 'long01', hairColor: '27272a', eyes: 'variant22', skinColor: 'f5cba7', clothing: 'dress', clothingColor: '15803d' },
    AriaDawn:  { bg: 'linear-gradient(160deg,#ffd8d8,#f4a0a0)', heroBg: 'linear-gradient(170deg,#ffd8d8,#f4a0a0,#ffe8e8)', seed: 'AriaDawn', hair: 'long02', hairColor: '3b0f0f', eyes: 'variant26', skinColor: 'fad9c1', clothing: 'sweater', clothingColor: '991b1b' },
    EllaRay:   { bg: 'linear-gradient(160deg,#ffe8c8,#f0c080)', heroBg: 'linear-gradient(170deg,#fff0d8,#f0c080,#fff6e6)', seed: 'EllaRay', hair: 'long06', hairColor: 'c97b2e', eyes: 'variant18', skinColor: 'f5cba7', clothing: 'dress', clothingColor: 'b45309' },
    MioKite:   { bg: 'linear-gradient(160deg,#ffe8f4,#f0a8d0)', heroBg: 'linear-gradient(170deg,#ffe8f4,#f0a8d0,#fff0f8)', seed: 'MioKite', hair: 'long15', hairColor: '111111', eyes: 'variant10', skinColor: 'fad9c1', clothing: 'shirt', clothingColor: 'be185d' },
  };
  const PRESET_ORDER = ['LunaVeil', 'KiraSol', 'NovaZen', 'AriaDawn', 'EllaRay', 'MioKite'];
  // Direct stageName → preset map (takes precedence over index-based fallback).
  const NAME_TO_PRESET = { HYUN: 'HYUN' };

  function avatarUrl(preset, size = 'card') {
    const c = CHAR_PRESETS[preset];
    if (!c) return '';
    const params = new URLSearchParams({
      seed: c.seed, backgroundColor: 'transparent',
      hair: c.hair, hairColor: c.hairColor, eyes: c.eyes, skinColor: c.skinColor,
      ...(size === 'card' ? { clothing: c.clothing, clothingColor: c.clothingColor } : {}),
    });
    return `https://api.dicebear.com/8.x/adventurer/svg?${params}`;
  }

  // Merge DB idols (up to 3 seeded) with reference presets so the 2-col grid is populated even early in development.
  const AGENCIES = ['Nova Entertainment', 'Stellar Records', 'Apex Talent', 'Luna Studios'];
  const TAG_POOL = ['Pop','Performance','Charisma','Dance','Vocal','Visual','Rap','Producer'];

  // Profile-specific overrides keyed by stageName.
  const PROFILE_OVERRIDES = {
    HYUN: {
      agency: 'Nova Entertainment',
      born: '2001.10.23',
      debut: '2026.08.29',
      tags: ['Raw Brilliance', 'Self-producing', 'Vocal', 'Lo-fi R&B'],
    },
  };

  function enrichIdol(idol, i) {
    const stageName = idol.stageName ?? idol.name ?? `Idol ${i+1}`;
    const presetKey = NAME_TO_PRESET[stageName] ?? PRESET_ORDER[i % PRESET_ORDER.length];
    const preset = CHAR_PRESETS[presetKey];
    const override = PROFILE_OVERRIDES[stageName] ?? {};
    return {
      id: idol.id,
      stageName,
      agency: override.agency ?? AGENCIES[i % AGENCIES.length],
      heartCount: idol.heartCount ?? Math.floor(3000 + i * 1200),
      followCount: idol.followCount ?? Math.floor(800 + i * 300),
      tags: override.tags ?? [TAG_POOL[i % TAG_POOL.length], TAG_POOL[(i+3) % TAG_POOL.length], TAG_POOL[(i+5) % TAG_POOL.length]],
      born: override.born ?? '2001.03.12',
      debut: override.debut ?? '2022.07.05',
      preset,
      presetKey,
      isFollowing: i === 0 || i === 2,
      isLiked: i === 0 || i === 2,
      source: idol.source ?? (DB_PATTERN.test(idol.id ?? '') && !idol.id.startsWith('preset-') ? 'db' : 'preset'),
      heroImageUrl: idol.heroImageUrl ?? null,
      mbti: idol.mbti ?? null,
    };
  }

  // Ensure the DB-backed HYUN record (not in the first 4 preset slots) is detected.
  const DB_PATTERN = /^[0-9a-f-]{36}$/i;

  function fillIdols(dbItems = []) {
    const list = [];
    for (let i = 0; i < 4; i++) {
      if (dbItems[i]) list.push(enrichIdol({ ...dbItems[i], source: 'db' }, i));
      else list.push(enrichIdol({
        id: `preset-${PRESET_ORDER[i % PRESET_ORDER.length]}`,
        stageName: PRESET_ORDER[i % PRESET_ORDER.length].replace(/([A-Z])/g, ' $1').trim(),
      }, i));
    }
    return list;
  }

  // ── Shared UI atoms ───────────────────────────────────────────
  const Icon = ({ id, style, className }) => (
    <svg style={style} className={className}><use href={`#i-${id}`}/></svg>
  );

  const StatusBar = () => (
    <div className="status-bar">

        <Icon id="battery" />

  const Notch = () => <div className="phone-notch"><div className="dynamic-island"></div></div>;

  const BottomTabs = ({ tab, setTab }) => {

      ['home', '홈', 'home'],
      ['audition', '오디션', 'trophy'],

      ['fanclub', '팬클럽', 'people'],

  // ── Login ─────────────────────────────────────────────────────
  function LoginScreen({ auth, goSignup }) {
    const [email, setEmail] = useState('demo@a-idol.dev');
    const [password, setPassword] = useState('password123');
    const [loading, setLoading] = useState(false);
    const [err, setErr] = useState(null);

    async function submit(e) {
      e.preventDefault();
      setErr(null); setLoading(true);
      try { await auth.login(email, password); }
      catch (e) { setErr(e.message); }
      finally { setLoading(false); }
    }

    return (
      <div className="phone-body">
        <div className="auth-body">
          <div className="auth-logo">★ A-idol</div>
          <div className="auth-sub">AI 아이돌 팬덤 플랫폼</div>

          <form onSubmit={submit} className="auth-form">
            <div>
              <label className="field-label">이메일</label>
              <input className="field-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" />
            </div>
            <div>
              <label className="field-label">비밀번호</label>
              <input className="field-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="8자 이상" />
            </div>
            {err ? <div className="error-msg">⚠ {err}</div> : null}
            <button className="primary-btn" disabled={loading}>{loading ? '로그인 중…' : '로그인'}</button>
            <button type="button" className="link-row" onClick={goSignup}>
              계정이 없으신가요? <b>회원가입</b>
            </button>
            <p className="fineprint">만 14세 이상만 가입 가능합니다. (POL-006)</p>
          </form>
        </div>
      </div>
    );
  }

  // ── Signup ────────────────────────────────────────────────────
  function SignupScreen({ auth, goBack }) {
    const rnd = Math.floor(Math.random() * 10_000);
    const [form, setForm] = useState({
      email: `demo${rnd}@a-idol.dev`,
      password: 'password123',
      nickname: `fan${rnd}`,
      birthdate: '2000-01-01',
    });
    const [err, setErr] = useState(null);
    const [loading, setLoading] = useState(false);

    async function submit(e) {
      e.preventDefault(); setErr(null); setLoading(true);
      try { await auth.signup(form); }
      catch (e) { setErr(e.message); }
      finally { setLoading(false); }
    }

    return (
      <div className="phone-body">
        <div className="nav-bar">
          <button className="hero-back-btn" style={{position:'static',background:'transparent',padding:0}} onClick={goBack}>
            <Icon id="chevl" style={{width:12,height:12,color:'var(--text1)'}}/>

        <div className="auth-body">
          <form onSubmit={submit} className="auth-form">
            <div><label className="field-label">이메일</label>
              <input className="field-input" type="email" value={form.email} onChange={set('email')} /></div>
            <div><label className="field-label">비밀번호</label>
              <input className="field-input" type="password" value={form.password} onChange={set('password')} /></div>
            <div><label className="field-label">닉네임</label>
              <input className="field-input" value={form.nickname} onChange={set('nickname')} /></div>
            <div><label className="field-label">생년월일</label>
              <input className="field-input" type="date" value={form.birthdate} onChange={set('birthdate')} /></div>
            {err ? <div className="error-msg">⚠ {err}</div> : null}
            <button className="primary-btn" disabled={loading}>{loading ? '가입 중…' : '가입하고 시작하기'}</button>
            <p className="fineprint">
              가입 시 서비스 약관 및 개인정보 처리방침에 동의한 것으로 간주됩니다.<br/>
              만 14세 미만은 가입이 제한됩니다. (POL-006)
            </p>
          </form>
        </div>
      </div>
    );
  }

  // ── Home Feed ─────────────────────────────────────────────────
  function FeedScreen({ idols, onOpenIdol }) {
    const agencies = ['All', ...Array.from(new Set(idols.map(i => i.agency.split(' ')[0])))];
    const [activeChip, setActiveChip] = useState('All');
    const [list, setList] = useState(idols);

    useEffect(() => {
      if (activeChip === 'All') return setList(idols);
      setList(idols.filter(i => i.agency.startsWith(activeChip)));
    }, [activeChip, idols]);

    return (
      <div className="phone-body">
        <div className="feed-scroll thin-scroll">
          <div className="feed-header">
            <div className="logo-text">★ A-idol</div>
            <div style={{display:'flex',gap:11,alignItems:'center'}}>
              <Icon id="search" style={{width:18,height:18,color:'var(--text2)'}}/>
              <Icon id="bell" style={{width:18,height:18,color:'var(--text2)'}}/>
            </div>
          </div>

          <div className="chips">
            {agencies.map(a => (
              <button key={a} className={`chip ${activeChip === a ? 'active' : ''}`} onClick={() => setActiveChip(a)}>{a}</button>
            ))}
          </div>

  // ── Audition ──────────────────────────────────────────────────
  function AuditionScreen({ idols }) {
    const [t, setT] = useState({ d: 3, h: 14, m: 22, s: 8 });
    useEffect(() => {
      const id = setInterval(() => {
        setT(({ d, h, m, s }) => {
          s -= 1;
          if (s < 0) { s = 59; m -= 1; }
          if (m < 0) { m = 59; h -= 1; }
          if (h < 0) { h = 23; d -= 1; }
          if (d < 0) { d = 0; h = 0; m = 0; s = 0; }
          return { d, h, m, s };
        });
      }, 1000);
      return () => clearInterval(id);
    }, []);
    const pad = (n) => String(n).padStart(2, '0');

    const ranked = [...idols]
      .sort((a, b) => b.heartCount - a.heartCount)
      .slice(0, 4)
      .map((idol, i) => ({
        idol,
        percent: [90, 78, 65, 50][i],
        count: [42183, 38921, 31042, 24400][i],
        color: ['var(--accent)', 'var(--accent2)', 'var(--success)', 'var(--gold)'][i],
        delta: ['up', 'down', 'up', '-'][i],

    return (
      <div className="phone-body">

          <div className="round-track">

            <div className="round-circle rc-fut" style={{background:'rgba(200,136,10,.12)',color:'var(--gold)',fontSize:5,border:'1.5px solid var(--gold)'}}>F</div>
          </div>

          <div style={{padding:'0 13px 4px',fontSize:9,color:'var(--text2)',display:'flex',alignItems:'center',gap:4}}>
            <Icon id="crown" style={{width:11,height:11,color:'var(--text2)'}}/>Live Rankings
          </div>

          <div className="rank-list">
            {ranked.map((r, i) => (
              <div key={r.idol.id} className="rank-row">
                <span className="rank-no">{i+1}</span>
                <div className="rank-avatar" style={{background:r.idol.preset.bg}}>
                  <img src={avatarUrl(r.idol.presetKey, 'card')} alt={r.idol.stageName}/>
                </div>
                <span className="rank-name">{r.idol.stageName}</span>
                <div className="rank-bar"><div className="rank-bar-fill" style={{width:`${r.percent}%`,background:r.color}}></div></div>
                <span className="rank-count">{r.count.toLocaleString()}</span>
                <span className={`rank-delta ${r.delta === 'up' ? 'dup' : r.delta === 'down' ? 'ddn' : ''}`} style={r.delta === '-' ? {color:'var(--text3)'} : undefined}>
                  {r.delta === 'up' ? '▲' : r.delta === 'down' ? '▼' : '—'}
                </span>
              </div>
            ))}
          </div>

          <div style={{padding:'7px 13px 14px',display:'flex',gap:7}}>
            <button style={{flex:1,padding:8,borderRadius:10,background:'var(--elevated)',color:'var(--text1)',fontSize:9,border:'1px solid var(--border)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4,fontWeight:600,fontFamily:'inherit'}}>

          </div>
        </div>
      </div>
    );
  }

            <div className="my-row" style={{cursor:'default'}}>
              <Icon id="cal"/>
              <span className="my-row-label">가입일</span>
              <span className="my-row-hint">{since}</span>
            </div>
            <div className="my-row" style={{cursor:'default'}}>
              <Icon id="person"/>
              <span className="my-row-label">Provider</span>
              <span className="my-row-hint">{user?.provider ?? '—'}</span>
            </div>
            <button className="my-row danger" onClick={onLogout}>
              <Icon id="logout"/>
              <span className="my-row-label">로그아웃</span>
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── App shell ─────────────────────────────────────────────────
  function App() {
    const auth = useAuth();
    const [route, setRoute] = useState('login'); // login | signup | app
    const [tab, setTab] = useState('home');
    const [detailIdol, setDetailIdol] = useState(null);
    const [idols, setIdols] = useState(() => fillIdols([]));
    const [apiUp, setApiUp] = useState(null);

    useEffect(() => {
      fetch(`${API_BASE}/idols`)
        .then(async r => {
          setApiUp(r.ok);
          if (r.ok) {
            const body = await r.json();
            setIdols(fillIdols(body.items ?? []));
          }
        })
        .catch(() => setApiUp(false));
    }, []);

    useEffect(() => {
      if (auth.accessToken && auth.user) setRoute('app');
      else if (!auth.accessToken) setRoute(r => r === 'signup' ? r : 'login');
    }, [auth.accessToken, auth.user]);

    function renderPhoneContent() {
      if (route === 'login') return <LoginScreen auth={auth} goSignup={() => setRoute('signup')} />;
      if (route === 'signup') return <SignupScreen auth={auth} goBack={() => setRoute('login')} />;

      // app routes
      if (detailIdol) return <DetailScreen idol={detailIdol} auth={auth} onClose={() => setDetailIdol(null)} />;
      if (tab === 'home')     return <FeedScreen idols={idols} onOpenIdol={setDetailIdol} />;
      if (tab === 'audition') return <AuditionScreen idols={idols} />;
      if (tab === 'gacha')    return <GachaScreen idols={idols} />;
      if (tab === 'fanclub')  return <FanclubScreen idols={idols} onOpenIdol={setDetailIdol} />;
      if (tab === 'my')       return <MyScreen user={auth.user} idols={idols} onLogout={auth.logout} onRefresh={auth.fetchMe} />;
      return null;
    }

    const currentLabel = route === 'login' ? 'SCR-001 로그인'
      : route === 'signup' ? 'SCR-002 회원가입'
      : detailIdol ? 'SCR-006 아이돌 상세'
      : tab === 'home' ? 'SCR-005 홈 피드'
      : tab === 'audition' ? 'SCR-011 오디션'
      : tab === 'gacha' ? 'SCR-017 포토카드 뽑기'
      : tab === 'fanclub' ? 'SCR-009 팬클럽'
      : 'SCR-050 MY';

    return (
      <div className="page-wrap">
        <p className="page-title">★ A-idol — 모바일 프로토타입</p>
        <div className="page-sub">UI v1.0.0 · Light Mode · localhost:3000 연동</div>
        <div style={{textAlign:'center'}}>
          <span className={`api-pill ${apiUp === true ? 'ok' : apiUp === false ? 'down' : ''}`}>
            <span className="dot"></span>
            {apiUp === null ? '백엔드 연결 확인 중…' : apiUp ? '백엔드 연결됨 · localhost:3000' : '백엔드 연결 실패'}
          </span>
        </div>

        <div className="frame-wrap">
          <div className="phone-wrap">
            <div className="phone">
              <Notch />
              <StatusBar />
              {renderPhoneContent()}
              {route === 'app' && !detailIdol ? <BottomTabs tab={tab} setTab={setTab} /> : null}
            </div>
            <div className="phone-label">{currentLabel}</div>
          </div>
        </div>

        <p className="fineprint" style={{maxWidth:520,margin:'28px auto 0',lineHeight:1.7}}>
          백엔드 <code>/api/v1/auth/*</code>, <code>/api/v1/idols</code>, <code>/api/v1/me</code> 는 실제 API 호출이며,
          캐릭터 일러스트·하트·채팅 등 팬덤 모듈(FR-120~)은 목업 데이터입니다.<br/>
          실제 React Native 앱은 <code>packages/mobile</code>에 구현되어 있습니다.
        </p>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
